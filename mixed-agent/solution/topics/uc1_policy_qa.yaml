kind: AdaptiveDialog
beginDialog:
  kind: OnRecognizedIntent
  id: uc1_policy_qa_mixed
  intent:
    triggerQueries:
      - What is the parental leave policy?
      - How many vacation days do I have?
      - When can I claim wellness reimbursement?
  actions:
    # UC1 — Policy Q&A
    # Mixed pattern: Copilot Studio's *generative answers* over the
    # SharePoint HR site provides the entire UC. No code, no AI Search.
    # HR makers edit policies in SharePoint; the agent picks them up automatically.
    - kind: SearchAndSummarizeContent
      id: answer
      moderateResponse: true
      enableGenerativeAnswers: true
      knowledgeSources:
        - kind: SharePoint
          site: https://contoso.sharepoint.com/sites/HR
          libraries: [Policies, Handbook]
      userInput: =System.Activity.Text
