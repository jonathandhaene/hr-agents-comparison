name: ZavaHRMobilityAdvisor
displayName: Zava HR Mobility & Feedback Advisor
model:
  deployment: gpt-4o          # change to mistral-large for EU-sovereignty deployments
  temperature: 0.2
instructions: |
  You are Zava HR's Mobility & Feedback Advisor. You are invoked from a
  Copilot Studio topic as a connected agent. Be concise. Mobility answers:
  90-word first-person pitch + one-line runner-up fit. Feedback summary:
  5 bullets covering strengths, blind spots, action items, theme, and an
  anonymity-safe quote.
tools:
  - kind: openapi
    name: hr_api
    spec_path: ../../backend/openapi.json
    auth:
      kind: managed_identity
publish:
  rest_endpoint:
    enabled: true
