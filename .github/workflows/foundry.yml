name: foundry

on:
  push:
    branches: [main]
    paths:
      - 'foundry-agent/**'
      - 'shared-fixtures/**'
      - '.github/workflows/foundry.yml'
  pull_request:
    paths:
      - 'foundry-agent/**'
      - 'shared-fixtures/**'
      - '.github/workflows/foundry.yml'
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

env:
  AZURE_LOCATION: westeurope
  AZURE_RESOURCE_GROUP_NAME: rg-hr-foundry
  IMAGE_BACKEND: hr-backend-foundry
  DEPLOYMENT_NAME: hr-foundry-${{ github.run_id }}

jobs:
  test:
    runs-on: ubuntu-latest
    defaults: { run: { working-directory: foundry-agent } }
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip
          cache-dependency-path: |
            foundry-agent/backend/requirements.txt
            foundry-agent/agent/requirements.txt
      - run: |
          mkdir -p backend/data
          cp ../shared-fixtures/*.json backend/data/
          cp -r ../shared-fixtures/policies backend/data/
          pip install -r backend/requirements.txt -r agent/requirements.txt pytest pytest-asyncio
          pytest -q tests

  validate-bicep:
    runs-on: ubuntu-latest
    defaults: { run: { working-directory: foundry-agent } }
    steps:
      - uses: actions/checkout@v4
      - run: az bicep build --file infra/main.bicep --stdout > /dev/null

  deploy:
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    needs: [test, validate-bicep]
    runs-on: ubuntu-latest
    defaults: { run: { working-directory: foundry-agent } }
    steps:
      - uses: actions/checkout@v4
      - uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
      - run: az group create -n $AZURE_RESOURCE_GROUP_NAME -l $AZURE_LOCATION
      - name: What-if (preview)
        run: |
          az deployment group what-if \
            -g $AZURE_RESOURCE_GROUP_NAME \
            -n $DEPLOYMENT_NAME \
            -f infra/main.bicep \
            -p location=$AZURE_LOCATION
      - name: Provision (Bicep)
        run: |
          az deployment group create \
            -g $AZURE_RESOURCE_GROUP_NAME \
            -n $DEPLOYMENT_NAME \
            -f infra/main.bicep \
            -p location=$AZURE_LOCATION
      - name: Build & push backend
        id: out
        run: |
          ACR=$(az deployment group show -g $AZURE_RESOURCE_GROUP_NAME -n $DEPLOYMENT_NAME --query properties.outputs.acrLoginServer.value -o tsv)
          PROJECT_ENDPOINT=$(az deployment group show -g $AZURE_RESOURCE_GROUP_NAME -n $DEPLOYMENT_NAME --query properties.outputs.projectEndpoint.value -o tsv)
          echo "acr=$ACR" >> $GITHUB_OUTPUT
          echo "project_endpoint=$PROJECT_ENDPOINT" >> $GITHUB_OUTPUT
          mkdir -p backend/data
          cp ../shared-fixtures/*.json backend/data/
          cp -r ../shared-fixtures/policies backend/data/
          az acr login --name $ACR
          az acr build --registry $ACR --image $IMAGE_BACKEND:${{ github.sha }} --image $IMAGE_BACKEND:latest backend
          az containerapp update -g $AZURE_RESOURCE_GROUP_NAME -n hrfdy-api --image $ACR/$IMAGE_BACKEND:${{ github.sha }}
      - name: Install Foundry CLI extension
        run: az extension add --name ai-foundry --yes
      - name: Create or update hosted agent
        run: |
          az ai-foundry agent create \
            --project-endpoint "${{ steps.out.outputs.project_endpoint }}" \
            --file project/agent.yaml
      - name: Publish to M365 Copilot + Teams
        run: |
          az ai-foundry agent publish \
            --project-endpoint "${{ steps.out.outputs.project_endpoint }}" \
            --agent-name ZavaHRConcierge \
            --target m365-copilot teams
