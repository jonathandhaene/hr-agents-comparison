name: Refresh Azure prices for calculator

on:
  schedule:
    - cron: "0 6 * * 1" # Mondays 06:00 UTC
  workflow_dispatch:
  push:
    paths:
      - .github/workflows/refresh-prices.yml
      - scripts/refresh_prices.py

permissions:
  contents: write

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Fetch prices.azure.com snapshot
        run: python scripts/refresh_prices.py
      - name: Commit if changed
        run: |
          if [[ -n "$(git status --porcelain docs/calculator/prices.json)" ]]; then
            git config user.name  "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git add docs/calculator/prices.json
            git commit -m "chore(prices): refresh Azure retail prices snapshot"
            git push
          else
            echo "No price changes."
          fi
