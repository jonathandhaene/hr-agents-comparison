# Power Platform Solution Manifest (managed solution)
# Authored manually for the demo; in practice this file is generated by `pac solution init`
# and updated as components are added/removed via `pac solution add-reference`.
solutionUniqueName: ZavaHrConcierge
publisherUniqueName: ZavaHr
displayName: Zava HR Concierge (Copilot Studio)
version: 1.0.0.0
components:
  - type: bot
    schemaName: cra5e_HRConcierge
    files:
      - topics/uc1_policy_qa.yaml
      - topics/uc2_time_off.yaml
      - topics/uc3_onboarding.yaml
      - topics/uc4_mobility.yaml
      - topics/uc5_feedback.yaml
      - topics/uc6_triage.yaml
      - topics/uc7_performance_narrative.yaml
  - type: workflow
    files:
      - flows/HR_RequestLeaveAndApprove.json
      - flows/HR_StartOnboarding.json
      - flows/HR_OnboardingTick.json
      - flows/HR_FeedbackOpenOrSummarize.json
  - type: connector
    schemaName: cra5e_HrApiConnector
    file: connectors/hr-api.swagger.json
  - type: entity
    schemaName: cra5e_onboardingplans
  - type: entity
    schemaName: cra5e_feedbackrequests
  - type: entity
    schemaName: cra5e_tickets
  - type: entity
    schemaName: cra5e_performancenarrative_drafts
channels:
  - name: M365CopilotChat
    enabled: true
  - name: MicrosoftTeams
    enabled: true
